
services:

  api:
    build: ./backend
    container_name: amotech_api
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: amotech_mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: amotech
      MYSQL_USER: amotech_user
      MYSQL_PASSWORD: amotech_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: